@if (loading$ | async) {
    <div class="loader">
        <div>{{ 'global.loading' | translate }}...</div>
    </div>
} @else {
    <app-header></app-header>
    <main class="container">
        <app-product-details></app-product-details>
        @if (debug$ | async) {
            <app-json-output></app-json-output>
        }
    </main>
    <app-footer></app-footer>
}
